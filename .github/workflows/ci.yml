name: "Build CI"

on: [push, pull_request]

jobs:
  flake-check:
      runs-on: testing
      steps:
        - name: Clone the repository
          uses: actions/checkout@v6

        - name: Flake check
          run: nix flake check --system x86_64-linux

        - name: Build the package
          run: nix build . --show-trace
